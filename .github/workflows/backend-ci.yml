name: Backend CI

on:
  push:
    branches: [main, qa, development]
    paths: [backend/**]
  pull_request:
    branches: [main, qa]
    paths: [backend/**]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check . && poetry run ruff format --check .

      - name: Test (pytest)
        run: poetry run pytest
        env:
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_ROLE_KEY: test
          SUPABASE_JWT_SECRET: test-secret-at-least-32-chars-long!!
          GEMINI_API_KEY: test
          LINKD_API_KEY: test
          UPSTASH_REDIS_URL: http://localhost
          UPSTASH_REDIS_TOKEN: test
          ENVIRONMENT: qa

  deploy-qa:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/qa' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (QA)
        run: railway up --service knit-api-qa
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: backend

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (prod)
        run: railway up --service knit-api-prod
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: backend
