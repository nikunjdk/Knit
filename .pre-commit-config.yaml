repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        language: system
        entry: dart format --set-exit-if-changed
        types: [file]
        files: ^frontend/.*\.dart$

      - id: flutter-analyze
        name: flutter analyze
        language: system
        entry: bash -c "cd frontend && flutter analyze --no-fatal-infos"
        files: ^frontend/
        pass_filenames: false
